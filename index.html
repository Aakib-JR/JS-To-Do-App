<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>To Do App 📝</h1>

        <div class="inpBox">
            <input type="text" id="inputEl" placeholder="Type here...">
            <button id="addBtnEl" onclick="add()">Add</button>
        </div>

        <ul id="ulEl">

            <li class="listEl">

                <span class="labelEl">Book 1</span>

                <div>
                    <span class="markEl">🖍</span>
                    <span class="delEl">🗑</span>
                </div>

            </li>

        </ul>

    </div>

    <script src="script.js"></script>

</body>

</html>
